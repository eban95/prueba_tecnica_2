<div class="users-container">
  <h2>Lista de Usuarios</h2>

  <p>{{ message }}</p>

  <table *ngIf="users.length > 0">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Email</th>
        <th>ID</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of users">
        <td>{{ user.name }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user._id }}</td>
        <td>
          <button (click)="deleteUser(user._id)">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>

  <p *ngIf="users.length === 0">No hay usuarios</p>
</div>
